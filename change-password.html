<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 변경 · OPUSCLAM.COM</title>
<script>(function(){try{if(localStorage.getItem('oc-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="/assets/auth.css">
<style>.cp-msg{padding:24px 0;text-align:center;color:var(--tx3);line-height:1.7}.btn.block{display:block;text-align:center;width:100%}.btn.ghost.block{margin-top:10px}</style>
</head>
<body>
<div id="oc-net" class="oc-net" aria-hidden="true"></div>
<!-- ===== header (partials/header-auth.html 에서 공통 관리) ===== -->
<div id="oc-header-auth"></div>
<script src="/assets/include.js"></script>
<script src="/assets/app.js"></script><main><div class="wrap narrow" style="margin-top:70px"><div class="authcard"><h2>비밀번호 변경</h2><div id="cp-body"><div class="cp-msg">확인 중…</div></div></div></div></main><div id="oc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/auth.js"></script>
<script>
(function(){
  var URL="https://ptdxzxkgddvkusamkiol.supabase.co", KEY="sb_publishable_FDTL3-sQ0c5NVCTA2lif7Q_v6Wee8Wu";
  var sb=window.supabase.createClient(URL,KEY);
  var body=document.getElementById('cp-body');
  function needLogin(){ body.innerHTML='<div class="cp-msg">로그인이 필요합니다.<br><br><a class="btn primary block" href="/login.html">로그인하기</a></div>'; }
  function social(){ body.innerHTML='<div class="cp-msg">구글·카카오(소셜 로그인) 회원은 비밀번호가 없습니다.<br>비밀번호 변경이 필요하지 않습니다.<br><br><a class="btn primary block" href="/mypage.html">마이페이지로</a></div>'; }
  function form(){
    body.innerHTML=''
      +'<div class="sub">보안을 위해 현재 비밀번호를 먼저 확인합니다.</div>'
      +'<div class="fg"><label class="fl">현재 비밀번호</label><input class="inp" type="password" id="cp-cur" placeholder="현재 비밀번호"></div>'
      +'<div class="fg"><label class="fl">새 비밀번호</label><input class="inp" type="password" data-k="password" id="cp-new" placeholder="8자 이상 영문·숫자·특수문자"></div>'
      +'<div class="fg"><label class="fl">새 비밀번호 확인</label><input class="inp" type="password" id="cp-new2" placeholder="새 비밀번호 재입력"></div>'
      +'<div class="err" id="cp-err"></div>'
      +'<div class="actions"><button class="btn primary block" id="cp-btn">비밀번호 변경</button></div>';
    var cur=document.getElementById('cp-cur'), nw=document.getElementById('cp-new'), nw2=document.getElementById('cp-new2'), err=document.getElementById('cp-err'), btn=document.getElementById('cp-btn');
    async function change(){
      err.style.color=''; err.textContent='';
      if(!cur.value){ err.style.color='#f2777a'; err.textContent='현재 비밀번호를 입력해 주세요.'; return; }
      var v=nw.value, v2=nw2.value;
      var okRule=(v.length>=8)&&/[A-Za-z]/.test(v)&&/[0-9]/.test(v)&&/[^A-Za-z0-9]/.test(v);
      if(!okRule){ err.style.color='#f2777a'; err.textContent='새 비밀번호는 8자 이상, 영문·숫자·특수문자를 포함해야 합니다.'; return; }
      if(v!==v2){ err.style.color='#f2777a'; err.textContent='새 비밀번호가 일치하지 않습니다.'; return; }
      if(v===cur.value){ err.style.color='#f2777a'; err.textContent='현재 비밀번호와 다른 비밀번호를 사용해 주세요.'; return; }
      btn.disabled=true; btn.textContent='변경 중…';
      var vr=await window.ocAuth.verifyCurrentPassword(cur.value);
      if(!vr.ok){ err.style.color='#f2777a'; err.textContent=vr.msg||'현재 비밀번호가 일치하지 않습니다.'; btn.disabled=false; btn.textContent='비밀번호 변경'; return; }
      var ur=await window.ocAuth.updatePassword(v);
      btn.disabled=false; btn.textContent='비밀번호 변경';
      if(!ur.ok){ err.style.color='#f2777a'; err.textContent=ur.msg||'변경에 실패했습니다.'; return; }
      body.innerHTML='<div class="cp-msg" style="color:#3a9d63">비밀번호가 변경되었습니다.<br><br><a class="btn primary block" href="/mypage.html">마이페이지로</a></div>';
    }
    btn.addEventListener('click', change);
    nw2.addEventListener('keydown', function(e){ if(e.key==='Enter') change(); });
  }
  sb.auth.getSession().then(function(r){
    var s=r.data&&r.data.session;
    if(!s){ needLogin(); return; }
    var prov=s.user.app_metadata&&s.user.app_metadata.provider;
    if(prov && prov!=='email'){ social(); return; }
    form();
  });
})();
</script>
</body>
</html>
