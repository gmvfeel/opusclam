<body data-header="overlay">
<div id="oc-header"></div>

<section class="pdb">
  <div class="pdb-bg" aria-hidden="true">
    <div class="wave">
      <div class="scene scene-net on">
        <svg viewBox="0 0 1280 460" preserveAspectRatio="xMidYMid slice">
          <defs><linearGradient id="dg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9C7FD6"/><stop offset="1" stop-color="#C9A94E"/></linearGradient></defs>
          <g fill="url(#dg)"></g>
        </svg>
      </div>
    </div>
  </div>
  <div class="pdb-inner">

    <nav class="pdb-crumb" aria-label="위치">
      <a href="/home.html">홈</a><span>/</span><a href="#">OC커뮤니티</a><span>/</span><a href="/community/news.html">뉴스 · 공지사항</a><span>/</span><span class="on">글쓰기</span>
    </nav>

    <nav class="pdb-subnav" aria-label="OC커뮤니티 하위 메뉴">
      <a href="#">핫토픽</a>

      <a href="#">연주회 티켓신청</a>
    </nav>

    <header class="pdb-head">
      <div class="pdb-titlebar">
        <div>
          <div class="pdb-eyebrow">OC COMMUNITY</div>
          <h1 class="pdb-title" id="bwHead">뉴스 · 공지 작성</h1>
        </div>
      </div>
    </header>
  </div>
</section>

<main class="board">
  <div id="bwGate" class="bf-gate">확인 중…</div>

  <form class="board-form" id="bwForm" style="display:none" onsubmit="return false">
    <div class="bf-inline">
      <div class="bf-row" style="flex:0 0 160px">
        <label>분류</label>
        <select id="f-category"><option value="공지">공지</option><option value="뉴스" selected>뉴스</option></select>
      </div>
      <div class="bf-row" style="display:flex;align-items:flex-end">
        <label class="bf-check"><input type="checkbox" id="f-pinned"> 상단 고정(공지)</label>
      </div>
    </div>
    <div class="bf-row"><label>제목</label><input type="text" id="f-title" placeholder="제목을 입력하세요"></div>
    <div class="bf-row"><label>내용</label><textarea id="f-body" placeholder="내용을 입력하세요"></textarea></div>
    <div class="bf-row"><label>썸네일 이미지 URL <span style="color:var(--text-3);font-weight:400">(선택)</span></label><input type="text" id="f-thumb" placeholder="https://..."></div>
    <div class="bf-row"><label>외부 원문 링크 <span style="color:var(--text-3);font-weight:400">(선택)</span></label><input type="text" id="f-link" placeholder="https://..."></div>
    <div class="bf-actions">
      <a class="bf-cancel" href="news.html">취소</a>
      <button type="button" class="bf-submit" id="bwSubmit">등록</button>
    </div>
    <div class="bf-msg" id="bwMsg"></div>
  </form>
</main>

<div id="oc-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/auth.js"></script>
<script>
(function(){
  var SB_URL='https://ptdxzxkgddvkusamkiol.supabase.co';
  var SB_KEY='sb_publishable_FDTL3-sQ0c5NVCTA2lif7Q_v6Wee8Wu';
  var sb=window.supabase.createClient(SB_URL, SB_KEY);
  var editId=new URLSearchParams(location.search).get('id');
  function $(id){ return document.getElementById(id); }
  function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function gate(msg){ var g=$('bwGate'); g.style.display=''; g.innerHTML=esc(msg)+'<br><br><a class="bf-cancel" href="news.html">목록으로</a>'; }

  document.addEventListener('DOMContentLoaded', function(){
    sb.auth.getSession().then(function(r){
      var user=r.data && r.data.session && r.data.session.user;
      if(!user){ gate('로그인이 필요합니다. (관리자 전용)'); return; }
      sb.from('members').select('is_admin').eq('id', user.id).single().then(function(mr){
        if(mr.error || !mr.data || !mr.data.is_admin){ gate('관리자만 작성할 수 있습니다.'); return; }
        initForm();
      });
    });
  });

  function initForm(){
    $('bwGate').style.display='none';
    $('bwForm').style.display='';
    if(editId){
      $('bwHead').textContent='뉴스 · 공지 수정';
      $('bwSubmit').textContent='수정';
      sb.from('news').select('*').eq('id', editId).single().then(function(r){
        if(r.error || !r.data){ $('bwMsg').textContent='글을 불러오지 못했습니다.'; return; }
        var o=r.data;
        $('f-category').value=o.category||'뉴스';
        $('f-pinned').checked=!!o.is_pinned;
        $('f-title').value=o.title||'';
        $('f-body').value=o.body||'';
        $('f-thumb').value=o.thumb_url||'';
        $('f-link').value=o.link_url||'';
      });
    }
    $('bwSubmit').addEventListener('click', submit);
  }

  function submit(){
    var btn=$('bwSubmit');
    var payload={
      category: $('f-category').value,
      title: $('f-title').value.trim(),
      body: $('f-body').value,
      thumb_url: $('f-thumb').value.trim() || null,
      link_url: $('f-link').value.trim() || null,
      is_pinned: $('f-pinned').checked
    };
    if(!payload.title){ $('bwMsg').textContent='제목을 입력하세요.'; return; }
    btn.disabled=true; $('bwMsg').textContent='저장 중…';
    var p;
    if(editId){
      payload.updated_at=new Date().toISOString();
      p=sb.from('news').update(payload).eq('id', editId).select('id').single();
    } else {
      p=sb.from('news').insert(payload).select('id').single();
    }
    p.then(function(r){
      if(r.error){ $('bwMsg').textContent='저장 실패: '+r.error.message; btn.disabled=false; return; }
      var id=(r.data && r.data.id) || editId;
      location.href='news-view.html?id='+encodeURIComponent(id);
    });
  }
})();
</script>
<script src="/assets/app.js" defer></script>
</body>
</html>
