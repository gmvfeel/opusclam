<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script>(function(){try{if(localStorage.getItem('oc-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스 · 공지사항 · OPUSCLAM</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/icon-192.png">
<meta name="theme-color" content="#0a0d24">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="OPUSCLAM">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/assets/board.css">
</head>
<body>
<div id="oc-header"></div>
<script src="/assets/include.js"></script>
<script src="/assets/header.js"></script>

<main class="board">
  <div class="board-titlebar">
    <div class="tt">
      <div class="board-eyebrow">OC COMMUNITY</div>
      <h1 class="board-title-h">뉴스 · 공지사항</h1>
      <div class="board-count">전체 <b>0</b>건</div>
    </div>
  </div>

  <div class="board-bar">
    <div class="board-cats"></div>
    <div class="spring"></div>
    <div class="board-search">
      <input type="text" placeholder="제목·내용 검색" aria-label="검색">
      <button type="button" class="board-searchbtn" aria-label="검색">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </button>
    </div>
    <div class="board-actions"></div>
  </div>

  <div class="board-list"></div>
  <div class="board-pager"></div>
</main>

<div id="oc-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/auth.js"></script>
<script src="/assets/board.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function(){
    OCBoard.list({
      table:'news', pageSize:20, viewPage:'news-view.html', writePage:'news-write.html',
      searchCols:['title','body'],
      categories:[{value:'',label:'전체'},{value:'공지',label:'공지'},{value:'뉴스',label:'뉴스'}],
      pinnedFirst:true
    });
  });
</script>
<script src="/assets/app.js" defer></script>
</body>
</html>
