          <g fill="url(#dg)"></g>
        </svg>
      </div>
    </div>
  </div>
  <div class="pdb-inner">

    <nav class="pdb-crumb" aria-label="위치">
      <a href="/home.html">홈</a><span>/</span><a href="#">OC커뮤니티</a><span>/</span><span class="on">뉴스 · 공지사항</span>
    </nav>

    <nav class="pdb-subnav" aria-label="OC커뮤니티 하위 메뉴">
      <a href="#">핫토픽</a>
      <a href="#">공연사진 / 영상</a>

    <header class="pdb-head">
      <div class="pdb-titlebar">
        <div>
          <div class="pdb-eyebrow">OC COMMUNITY</div>
          <h1 class="pdb-title">뉴스 · 공지사항</h1>
        </div>
      </div>
      <p class="pdb-lead">오퍼스클램의 공지와 국내외 클래식 음악계 소식을 한곳에서 확인하세요.</p>
    </header>
  </div>
</section>

<main class="board">
  <div class="board-bar">
    <div class="board-cats"></div>
    <div class="spring"></div>
    <div class="board-count" style="margin:0 14px 0 0">전체 <b>0</b>건</div>
    <div class="board-search">
      <input type="text" placeholder="제목·내용 검색" aria-label="검색">
      <button type="button" class="board-searchbtn" aria-label="검색">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </button>
    </div>
    <div class="board-actions"></div>
  </div>

  <div class="board-list"></div>
  <div class="board-pager"></div>
</main>

<!-- ===== list bottom ad banners (인물DB와 동일) ===== -->

  <div class="wrap">

<div id="oc-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/auth.js"></script>
<script src="/assets/board.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function(){
    OCBoard.list({
      table:'news', pageSize:20, viewPage:'news-view.html', writePage:'news-write.html',
      searchCols:['title','body'],
      categories:[{value:'',label:'전체'},{value:'공지',label:'공지'},{value:'뉴스',label:'뉴스'}],
      pinnedFirst:true
    });
  });
</script>
