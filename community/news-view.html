<body data-header="overlay">

<section class="pdb pdb-board">
  <div class="pdb-bg" aria-hidden="true">
    <div class="wave">
      <div class="scene scene-net on">
        <svg viewBox="0 0 1280 460" preserveAspectRatio="xMidYMid slice">
          <defs><linearGradient id="dg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9C7FD6"/><stop offset="1" stop-color="#C9A94E"/></linearGradient></defs>
          <g fill="url(#dg)"></g>
        </svg>
      </div>
    </div>
  </div>
  <div class="pdb-inner">

    <nav class="pdb-crumb" aria-label="위치">
      <a href="/home.html">홈</a><span>/</span><a href="#">OC커뮤니티</a><span>/</span><a href="/community/news.html">뉴스</a>
    </nav>

    <nav class="pdb-subnav" aria-label="OC커뮤니티 하위 메뉴">
      <a href="#">핫토픽</a>
      <a href="#">공연사진 / 영상</a>
      <a href="#">입시</a>
      <a href="#">지식나눔</a>
      <a href="#">SELF PR</a>
      <a href="#">이달의 음악학교</a>
      <a href="/community/news.html" class="active">뉴스</a>
      <a href="#">현대음악</a>
      <a href="#">유틸리티 / 악보 / 자료</a>
      <a href="#">태교음악</a>
      <a href="#">연주회 티켓신청</a>
    </nav>

    <header class="pdb-head">
      <div class="pdb-titlebar">
        <div>
          <div class="pdb-eyebrow">OC COMMUNITY</div>
          <h1 class="pdb-title">뉴스</h1>
        </div>
      </div>
    </header>
  </div>
</section>

<main class="board">
  <div class="pv-utility">
    <div class="pv-tools">
      <button type="button" class="pv-tool" data-toggle aria-pressed="false"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3.5l2.6 5.3 5.9.9-4.2 4.1 1 5.9-5.3-2.8-5.3 2.8 1-5.9L3.5 9.7l5.9-.9z"/></svg>즐겨찾기</button>
      <button type="button" class="pv-tool" data-toggle aria-pressed="false"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M6 3h12v18l-6-4-6 4z"/></svg>킵</button>
      <button type="button" class="pv-tool" data-save aria-haspopup="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg>저장</button>
      <button type="button" class="pv-tool" data-share><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="18" cy="5" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="19" r="2.5"/><path d="M8.1 10.9l7.8-4.7M8.1 13.1l7.8 4.7"/></svg>공유</button>
    </div>
    <div class="pdb-fontsize" role="group" aria-label="글자 크기 조절">
      <span class="fs-label">글자크기</span>
      <button type="button" class="fs-btn" data-fs="down" aria-label="글자 작게">가–</button>
      <button type="button" class="fs-btn" data-fs="reset" aria-label="기본 크기">가</button>
      <button type="button" class="fs-btn" data-fs="up" aria-label="글자 크게">가+</button>
    </div>
  </div>

  <article class="board-view pv">
    <div class="board-empty">불러오는 중…</div>
  </article>
  <section class="bv-comments"></section>
  <a class="pv-tolist-m" href="news.html">&#8592; 목록으로</a>
</main>

<a class="pv-listtab" href="news.html" aria-label="리스트로 가기">
  <span class="pv-listtab-arrow">&#8249;</span>
  <span class="pv-listtab-text">리스트</span>
</a>

<div id="oc-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  document.addEventListener('DOMContentLoaded', function(){
    OCBoard.view({
      table:'news', listPage:'news.html', viewPage:'news-view.html', writePage:'news-write.html',
      writeRole:'member', incrementFn:'news_increment_view', commentsTable:'news_comments'
    });
  });
</script>
<script src="/assets/app.js" defer></script>
