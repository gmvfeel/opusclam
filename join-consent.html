<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>회원가입 · 약관 동의 · OPUSCLAM.COM</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="/assets/auth.css">
</head>
<body>
<header class="au-head"><div class="in">
  <a class="au-brand" href="/home.html">OPUSCLAM<span>.COM</span></a>
  <nav><a href="/login.html">로그인</a><a href="/join.html">회원가입</a></nav>
</div></header>

<main class="au-wrap" style="max-width:760px">
  <div class="au-logo">OPUSCLAM<span>.COM</span><small>CLASSIC SPECIALIST</small></div>

  <div class="au-steps">
    <div class="au-step on"><div class="dot">📄</div>약관동의</div>
    <div class="sep">•••</div>
    <div class="au-step"><div class="dot">✎</div>정보입력</div>
    <div class="sep">•••</div>
    <div class="au-step"><div class="dot">👥</div>가입완료</div>
  </div>

  <div class="au-cardbox">
    <div class="au-label" style="font-size:14px">오퍼스클램 이용약관 <span class="req">(필수)</span></div>
    <div class="au-terms" id="t1">불러오는 중…</div>
    <label class="au-agree"><input type="checkbox" id="ag1"> 이용약관에 동의합니다. (<a href="/terms.html" target="_blank">전문 보기</a>)</label>

    <div class="au-label" style="font-size:14px">개인정보 수집 및 이용 동의 <span class="req">(필수)</span></div>
    <div class="au-terms" id="t2">불러오는 중…</div>
    <label class="au-agree"><input type="checkbox" id="ag2"> 개인정보 수집·이용에 동의합니다. (<a href="/privacy.html" target="_blank">전문 보기</a>)</label>

    <label class="au-agree" style="border-top:1px solid var(--line);padding-top:16px;margin-top:4px;font-weight:700">
      <input type="checkbox" id="agAll"> 위 내용에 모두 동의합니다.
    </label>
    <div class="au-err" id="cs-err"></div>
  </div>

  <div class="au-actions">
    <button class="au-btn primary" id="cs-next">다음</button>
    <a class="au-btn ghost" href="/join.html">취소</a>
  </div>
</main>

<footer class="au-foot"><div class="in">
  <a href="/terms.html">서비스약관</a><a href="/privacy.html">개인정보처리방침</a><a href="/data-policy.html">데이터 정책</a><br>
  (주)윅슨어소시에이츠 · 서울특별시 마포구 동교로 215-1(동교동) 스튜디오한사 406 · Tel 02-3141-1305<br>
  © 2026 opusclam &amp; wixon associates Inc. All rights reserved.
</div></footer>

<script>
(function(){
  var VALID={major:'/join-major.html',industry:'/join-industry.html',school:'/join-school.html',general:'/join-general.html'};
  var type=new URLSearchParams(location.search).get('type');
  var next=VALID[type] || '/join.html';

  // 약관·개인정보 요약을 실제 문서에서 불러와 미리 보여줌(전문은 링크)
  function load(url, el){
    fetch(url).then(function(r){return r.ok?r.text():'';}).then(function(html){
      try{
        var doc=new DOMParser().parseFromString(html,'text/html');
        var main=doc.querySelector('.lp-main');
        document.getElementById(el).innerHTML = main ? main.innerHTML : '문서를 확인하려면 [전문 보기]를 눌러주세요.';
      }catch(e){ document.getElementById(el).textContent='문서를 확인하려면 [전문 보기]를 눌러주세요.'; }
    }).catch(function(){ document.getElementById(el).textContent='문서를 확인하려면 [전문 보기]를 눌러주세요.'; });
  }
  load('/terms.html','t1'); load('/privacy.html','t2');

  var ag1=document.getElementById('ag1'), ag2=document.getElementById('ag2'), agAll=document.getElementById('agAll');
  agAll.addEventListener('change', function(){ ag1.checked=agAll.checked; ag2.checked=agAll.checked; });
  function sync(){ agAll.checked = ag1.checked && ag2.checked; }
  ag1.addEventListener('change', sync); ag2.addEventListener('change', sync);

  document.getElementById('cs-next').addEventListener('click', function(){
    var err=document.getElementById('cs-err'); err.textContent='';
    if(!ag1.checked || !ag2.checked){ err.textContent='필수 항목에 모두 동의해 주세요.'; return; }
    location.href = next;
  });
})();
</script>
</body>
</html>
