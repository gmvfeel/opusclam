<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 · 약관 동의 · OPUSCLAM.COM</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="/assets/auth.css">
<style>
  /* 바깥 폼(카드): 흰 배경 + 외곽선만 + 넉넉한 여백 */
  .tbox{background:#ffffff;border:1px solid #e2e0ea;box-shadow:none;padding:56px 34px 50px;margin-bottom:26px}
  /* 안쪽 약관 스크롤 박스 */
  .terms{max-height:300px;background:#ffffff;color:#2a2a35;border-color:#ececf2}
  .terms *{color:#2a2a35}
  .terms h1{font-size:17px;font-weight:800;margin:2px 0 8px}
  .terms h2{font-size:15px;font-weight:700;margin:10px 0 6px}
  .terms h3{font-size:14px;font-weight:700;margin:8px 0 5px}
</style>
</head>
<body>
<!-- ===== header (partials/header-auth.html 에서 공통 관리) ===== -->
<div id="oc-header-auth"></div>
<script src="/assets/include.js"></script>
<script src="/assets/app.js"></script>
<main><div class="wrap">
  <div class="steps">
    <div class="step on"><div class="dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg></div>약관동의</div>
    <div class="sep">•••</div>
    <div class="step"><div class="dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 20h9"/><path d="M16.5 3.5a2 2 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></div>정보입력</div>
    <div class="sep">•••</div>
    <div class="step"><div class="dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 6L9 17l-5-5"/></svg></div>가입완료</div>
  </div>
  <div class="ctitle">약관 및 개인정보 수집·이용 동의</div>
  <div class="tbox"><h4>오퍼스클램 이용약관 <span class="req">(필수)</span></h4><div class="terms" id="t1">불러오는 중…</div>
    <label class="agree"><input type="checkbox" id="ag1"> 이용약관에 동의합니다. <a href="/terms.html" target="_blank">전문 보기</a></label></div>
  <div class="tbox"><h4>개인정보 수집 및 이용 동의 <span class="req">(필수)</span></h4><div class="terms" id="t2">불러오는 중…</div>
    <label class="agree"><input type="checkbox" id="ag2"> 개인정보 수집·이용에 동의합니다. <a href="/privacy.html" target="_blank">전문 보기</a></label></div>
  <label class="allbox"><input type="checkbox" id="agAll"> 위 내용에 모두 동의합니다.</label>
  <div class="err" id="cs-err"></div>
  <div class="actions"><button class="btn primary" id="cs-next">다음 단계</button><a class="btn ghost" href="/join.html">취소</a></div>
</div></main>
<div id="oc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/auth.js"></script>
<script>
(function(){
  var VALID={major:'/join-major.html',industry:'/join-industry.html',school:'/join-school.html',general:'/join-general.html'};
  var type=new URLSearchParams(location.search).get('type'); var next=VALID[type]||'/join.html';
  function load(url,el){ fetch(url).then(function(r){return r.ok?r.text():'';}).then(function(html){
    try{var doc=new DOMParser().parseFromString(html,'text/html');var m=doc.querySelector('.lp-main');
      document.getElementById(el).innerHTML=m?m.innerHTML:'문서를 확인하려면 [전문 보기]를 눌러주세요.';}
    catch(e){document.getElementById(el).textContent='문서를 확인하려면 [전문 보기]를 눌러주세요.';}
  }).catch(function(){document.getElementById(el).textContent='문서를 확인하려면 [전문 보기]를 눌러주세요.';}); }
  load('/terms.html','t1');load('/privacy.html','t2');
  var ag1=document.getElementById('ag1'),ag2=document.getElementById('ag2'),agAll=document.getElementById('agAll');
  agAll.addEventListener('change',function(){ag1.checked=agAll.checked;ag2.checked=agAll.checked;});
  function sync(){agAll.checked=ag1.checked&&ag2.checked;} ag1.addEventListener('change',sync);ag2.addEventListener('change',sync);
  document.getElementById('cs-next').addEventListener('click',function(){var err=document.getElementById('cs-err');err.textContent='';
    if(!ag1.checked||!ag2.checked){err.textContent='필수 항목에 모두 동의해 주세요.';return;} location.href=next;});
})();
</script>
</body>
</html>
