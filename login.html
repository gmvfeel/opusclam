<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 · OPUSCLAM.COM</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="/assets/auth.css">
</head>
<body>
<div id="oc-net" class="oc-net" aria-hidden="true"></div>
<!-- ===== header (partials/header-auth.html 에서 공통 관리) ===== -->
<div id="oc-header-auth"></div>
<script src="/assets/include.js"></script>
<script src="/assets/app.js"></script>
<main><div class="lmain">
  <div class="hero">
    <div class="brand">
      <span class="brand-tag">CLASSIC PLATFORM</span>
      <h1>클래식의 모든 순간,<br><strong>OPUSCLAM</strong>과 함께</h1>
      <p class="bp">국내 최고의 클래식 음악 데이터베이스부터 레슨, 구인구직 커뮤니티까지. 오퍼스클램에서 전문적인 네트워크를 경험해보세요.</p>
      <div class="stats">
        <div><div class="num">12,400+</div><div class="label">클래식 DB</div></div>
        <div><div class="num">8,500+</div><div class="label">아티스트 &amp; 회원</div></div>
      </div>
    </div>
    <div class="auth-box">
      <div class="tabs"><button class="tab active" type="button">로그인</button><button class="tab" type="button" id="tab-join">회원가입</button></div>
      <div class="fg"><label for="user-id">ID / E-mail</label><input type="text" id="user-id" placeholder="아이디를 입력하세요" autocomplete="username"></div>
      <div class="fg"><label for="user-pw">Password</label><input type="password" id="user-pw" placeholder="비밀번호를 입력하세요" autocomplete="current-password"></div>
      <div class="opts">
        <label><input type="checkbox" id="save-id"> 아이디 저장</label>
      </div>
      <button type="button" class="btn-primary" id="lg-btn">로그인하기</button>
      <div class="err" id="lg-err"></div>
      <div class="divider"><span>간편 로그인</span></div>
      <div class="social">
        <button type="button" class="soc google" data-p="google"><span class="ic"><b>G</b></span>Google</button>
        <button type="button" class="soc kakao" data-p="kakao"><span class="ic"><b>K</b></span>Kakao</button>
      </div>
      <div class="aflinks"><a href="/join-check.html">가입여부 확인</a><span>•</span><a href="/find-id.html">아이디 찾기</a><span>•</span><a href="/find-pw.html">비밀번호 찾기</a></div>
    </div>
  </div>
</div></main>
<div id="oc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/auth.js"></script>
<script>
(function(){
  var idEl=document.getElementById('user-id'), pwEl=document.getElementById('user-pw'), errEl=document.getElementById('lg-err');
  document.getElementById('tab-join').addEventListener('click',function(){ location.href='/join.html'; });
  async function doLogin(){
    errEl.textContent='';
    var id=idEl.value.trim(), pw=pwEl.value;
    if(!id||!pw){ errEl.textContent='아이디와 비밀번호를 입력해 주세요.'; return; }
    var r=await window.ocAuth.login(id, pw);
    if(!r.ok){ errEl.textContent=r.msg; return; }
    try{ if(document.getElementById('save-id').checked) localStorage.setItem('oc-saved-id', id); else localStorage.removeItem('oc-saved-id'); }catch(e){}
    location.href='/home.html';
  }
  document.getElementById('lg-btn').addEventListener('click', doLogin);
  pwEl.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  idEl.addEventListener('keydown', function(e){ if(e.key==='Enter') pwEl.focus(); });
  document.querySelectorAll('.soc[data-p]').forEach(function(b){ b.addEventListener('click',function(){ if(window.ocAuth&&window.ocAuth.social) window.ocAuth.social(b.getAttribute('data-p')); }); });
  try{ var s=localStorage.getItem('oc-saved-id'); if(s){ idEl.value=s; document.getElementById('save-id').checked=true; } }catch(e){}
})();
</script>
</body>
</html>
