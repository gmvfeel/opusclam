<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이페이지 · OPUSCLAM.COM</title>
<script>(function(){try{if(localStorage.getItem('oc-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="/assets/auth.css">
<style>
  .mp-wrap{max-width:640px;margin:56px auto;padding:0 20px}
  .mp-head{margin-bottom:26px}
  .mp-head .jtag{margin-bottom:14px}
  .mp-head h1{font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--tx)}
  .mp-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px 32px;box-shadow:0 6px 18px rgba(40,40,70,.12)}
  .mp-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .mp-badge{font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--line2);color:var(--tx2)}
  .mp-badge.type{background:var(--tagbg);color:var(--tx)}
  .mp-badge.approved{color:#3a9d63;border-color:rgba(58,157,99,.4)}
  .mp-badge.pending{color:#c99a2e;border-color:rgba(201,154,46,.4)}
  .mp-badge.rejected{color:#c05a5a;border-color:rgba(192,90,90,.4)}
  .mp-list{list-style:none;padding:0;margin:0 0 26px}
  .mp-list li{display:flex;justify-content:space-between;gap:16px;padding:13px 0;border-bottom:1px solid var(--hair);font-size:14px}
  .mp-list li:last-child{border-bottom:0}
  .mp-list .k{color:var(--tx3);flex:0 0 auto}
  .mp-list .v{color:var(--tx);font-weight:600;text-align:right;word-break:break-all}
  .mp-actions{display:flex;flex-direction:column;gap:10px}
  .mp-btn{width:100%;padding:14px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:1px solid var(--line2);font-family:inherit;text-align:center;display:block}
  .mp-btn.primary{background:var(--pri);color:var(--prit);border:none}
  .mp-btn.ghost{background:var(--chip);color:var(--tx2)}
  .mp-msg{padding:30px 0;text-align:center;color:var(--tx3);line-height:1.7}
</style>
<style>
  #mpFavs .mp-fav-group{margin-bottom:22px}
  #mpFavs .mp-fav-group:last-child{margin-bottom:0}
  #mpFavs h3{font-size:14px;font-weight:700;color:var(--tx,#20223a);margin:0 0 10px;display:flex;align-items:center;gap:8px}
  #mpFavs h3 .mp-fav-cnt{font-size:12px;font-weight:600;color:#fff;background:var(--accent,#7C63B0);border-radius:999px;padding:1px 8px}
  #mpFavs .mp-fav-list{list-style:none;margin:0;padding:0}
  #mpFavs .mp-fav-list li{display:flex;align-items:center;gap:10px;padding:10px 2px;border-top:1px solid var(--line,#efeae0)}
  #mpFavs .mp-fav-list li:first-child{border-top:0}
  #mpFavs .mp-fav-list a{flex:1;color:var(--tx,#20223a);text-decoration:none;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #mpFavs .mp-fav-list a:hover{color:var(--accent,#7C63B0);text-decoration:underline}
  #mpFavs .mp-fav-cat{flex:none;font-size:11px;color:var(--tx3,#8f90a6);border:1px solid var(--line2,#e4ded2);border-radius:6px;padding:2px 7px}
  #mpFavs .mp-fav-del{flex:none;width:24px;height:24px;border:0;background:none;color:var(--tx3,#8f90a6);font-size:18px;line-height:1;cursor:pointer;border-radius:6px}
  #mpFavs .mp-fav-del:hover{background:rgba(0,0,0,.06);color:var(--tx,#20223a)}
  #mpFavs .mp-fav-empty{font-size:13px;color:var(--tx3,#8f90a6);padding:4px 2px}
</style>
</head>
<body>
<div id="oc-net" class="oc-net" aria-hidden="true"></div>
<!-- ===== header (partials/header-auth.html 에서 공통 관리) ===== -->
<div id="oc-header-auth"></div>
<script src="/assets/include.js"></script>
<script src="/assets/app.js"></script>
<main>
  <div class="mp-wrap">
    <div class="mp-head">
      <span class="jtag">MY PAGE</span>
      <h1>마이페이지</h1>
    </div>
    <div class="mp-card" id="mpBody">
      <div class="mp-msg">불러오는 중…</div>
    </div>

    <div class="mp-head" style="margin-top:44px">
      <span class="jtag">SAVED</span>
      <h1 style="font-size:24px">내 즐겨찾기 · 킵</h1>
    </div>
    <div class="mp-card" id="mpFavs">
      <div class="mp-msg">불러오는 중…</div>
    </div>
  </div>
</main>
<div id="oc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/auth.js"></script>
<script>
(function(){
  var URL="https://ptdxzxkgddvkusamkiol.supabase.co";
  var KEY="sb_publishable_FDTL3-sQ0c5NVCTA2lif7Q_v6Wee8Wu";
  var TYPE={major:"전공자",industry:"음악관계자",org:"단체·기업",school:"음악학교",general:"일반"};
  var STATUS={pending:"승인 대기",approved:"승인 완료",rejected:"반려됨"};
  var QUAL=["major","industry","org","school"];
  var sb=window.supabase.createClient(URL,KEY);
  var box=document.getElementById("mpBody");
  function esc(s){return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function fmt(x){ if(!x)return "-"; try{var d=new Date(x);return d.getFullYear()+"."+("0"+(d.getMonth()+1)).slice(-2)+"."+("0"+d.getDate()).slice(-2);}catch(e){return "-";} }
  function doLogout(){ sb.auth.signOut().then(function(){ location.href="/home.html"; }); }

  function headerLoggedIn(m, session){
    var al=document.querySelector(".authlink"); if(!al) return;
    var nm=(m&&(m.name||m.username))||(session.user.email)||"회원";
    var tl=(m&&TYPE[m.member_type])||"";
    al.innerHTML='<a href="/account/mypage.html">'+esc(nm)+'님'+(tl?" ("+tl+")":"")+'</a> <a href="#" id="mpHdrLogout">로그아웃</a>';
    var lo=document.getElementById("mpHdrLogout");
    if(lo) lo.addEventListener("click",function(e){e.preventDefault();doLogout();});
  }

  function render(m, session){
    var qual = m.status==="approved" && QUAL.indexOf(m.member_type)>=0;
    var prov = session.user.app_metadata && session.user.app_metadata.provider;
    var isEmail = (!prov || prov==='email');
    var statusCls = m.status||"pending";
    var html=""
      +'<div class="mp-badges">'
      +  '<span class="mp-badge type">'+esc(TYPE[m.member_type]||m.member_type||"회원")+'</span>'
      +  '<span class="mp-badge '+esc(statusCls)+'">'+esc(STATUS[m.status]||m.status||"-")+'</span>'
      +'</div>'
      +'<ul class="mp-list">'
      +  '<li><span class="k">이름</span><span class="v">'+esc(m.name||"-")+'</span></li>'
      +  '<li><span class="k">아이디</span><span class="v">'+esc(m.username||"-")+'</span></li>'
      +  '<li><span class="k">이메일</span><span class="v">'+esc(m.email||"-")+'</span></li>'
      +  '<li><span class="k">휴대폰</span><span class="v">'+esc(m.phone||"-")+'</span></li>'
      +  '<li><span class="k">가입일</span><span class="v">'+fmt(m.created_at)+'</span></li>'
      +'</ul>'
      +'<div class="mp-actions">'
      +  (qual?'<a class="mp-btn primary" href="/db/db-write.html">DB 등록 · 보강 하러 가기</a>':'')
      +  (isEmail?'<a class="mp-btn ghost" href="/account/change-password.html">비밀번호 변경</a>':'')
      +  '<button class="mp-btn ghost" id="mpLogout">로그아웃</button>'
      +'</div>'
      +'<div style="text-align:center;margin-top:18px"><a href="/account/withdraw.html" style="font-size:12px;color:var(--tx3);text-decoration:underline">회원 탈퇴</a></div>';
    box.innerHTML=html;
    var lo=document.getElementById("mpLogout"); if(lo) lo.addEventListener("click",doLogout);
  }

  var FAV_META={
    person:{table:"persons",view:"person-view.html",label:"인물"},
    org:{table:"orgs",view:"org-view.html",label:"음악단체"},
    venue:{table:"venues",view:"venue-view.html",label:"공연장"},
    school:{table:"schools",view:"school-view.html",label:"음악학교"},
    modern:{table:"modern_composers",view:"modern-view.html",label:"현대음악"},
    foundation:{table:"foundations",view:"foundation-view.html",label:"기관·재단"},
    academic:{table:"academic",view:"academic-view.html",label:"학술"}
  };
  function renderFavs(rows, nameMap){
    var favBox=document.getElementById("mpFavs"); if(!favBox) return;
    function itemHtml(x){
      var meta=FAV_META[x.item_type]||{};
      var nm=(nameMap[x.item_type]&&nameMap[x.item_type][String(x.item_id)])||("#"+x.item_id);
      var href="/db/"+(meta.view||"#")+"?id="+encodeURIComponent(x.item_id);
      return '<li><a href="'+href+'">'+esc(nm)+'</a>'
        +'<span class="mp-fav-cat">'+esc(meta.label||x.item_type)+'</span>'
        +'<button type="button" class="mp-fav-del" data-fid="'+esc(x.id)+'" aria-label="삭제">\u00d7</button></li>';
    }
    function group(title, list){
      return '<div class="mp-fav-group"><h3>'+title+' <span class="mp-fav-cnt">'+list.length+'</span></h3>'
        +(list.length?'<ul class="mp-fav-list">'+list.map(itemHtml).join("")+'</ul>':'<div class="mp-fav-empty">아직 없습니다.</div>')+'</div>';
    }
    var favs=rows.filter(function(x){return x.kind==="favorite";});
    var keeps=rows.filter(function(x){return x.kind==="keep";});
    favBox.innerHTML=group("즐겨찾기", favs)+group("킵", keeps);
    favBox.querySelectorAll(".mp-fav-del").forEach(function(btn){
      btn.addEventListener("click",function(){
        var fid=btn.getAttribute("data-fid"); btn.disabled=true;
        sb.from("member_favorites").delete().eq("id",fid).then(function(dr){
          if(dr.error){ btn.disabled=false; return; }
          var li=btn.closest("li"); if(li) li.remove();
        });
      });
    });
  }
  function loadFavs(){
    var favBox=document.getElementById("mpFavs"); if(!favBox) return;
    sb.from("member_favorites").select("*").order("created_at",{ascending:false}).then(function(r){
      if(r.error){ favBox.innerHTML='<div class="mp-msg">목록을 불러오지 못했습니다.</div>'; return; }
      var rows=r.data||[];
      if(!rows.length){ favBox.innerHTML='<div class="mp-msg">아직 저장한 즐겨찾기·킵이 없습니다.<br><br>상세페이지에서 즐겨찾기·킵 버튼으로 저장할 수 있어요.</div>'; return; }
      var byType={}; rows.forEach(function(x){ (byType[x.item_type]=byType[x.item_type]||[]).push(x); });
      var jobs=Object.keys(byType).map(function(tp){
        var meta=FAV_META[tp]; if(!meta) return Promise.resolve({tp:tp,names:{}});
        var ids=byType[tp].map(function(x){return x.item_id;});
        return sb.from(meta.table).select("id,name_ko").in("id",ids).then(function(nr){
          var map={}; (nr.data||[]).forEach(function(o){ map[String(o.id)]=o.name_ko; }); return {tp:tp,names:map};
        }).catch(function(){ return {tp:tp,names:{}}; });
      });
      Promise.all(jobs).then(function(res){
        var nameMap={}; res.forEach(function(o){ nameMap[o.tp]=o.names; });
        renderFavs(rows, nameMap);
      });
    });
  }

  sb.auth.getSession().then(function(r){
    var session=(r.data&&r.data.session)?r.data.session:null;
    if(!session){
      box.innerHTML='<div class="mp-msg">로그인이 필요합니다.<br><br><a class="mp-btn primary" href="/account/login.html">로그인하기</a></div>';
      return;
    }
    sb.from("members").select("*").eq("id",session.user.id).single().then(function(mr){
      if(mr.error||!mr.data){
        box.innerHTML='<div class="mp-msg">회원 정보를 찾을 수 없습니다.<br>고객센터로 문의해 주세요.</div>';
        return;
      }
      render(mr.data, session);
      headerLoggedIn(mr.data, session);
      loadFavs();
    });
  });
})();
</script>
</body>
</html>
