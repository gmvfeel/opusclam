<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새 비밀번호 설정 · OPUSCLAM.COM</title>
<script>(function(){try{if(localStorage.getItem('oc-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="/assets/auth.css">
</head>
<body>
<!-- ===== header (partials/header-auth.html 에서 공통 관리) ===== -->
<div id="oc-header-auth"></div>
<script src="/assets/include.js"></script>
<script src="/assets/app.js"></script><main><div class="wrap narrow" style="margin-top:70px"><div class="authcard"><h2>새 비밀번호 설정</h2><div class="sub">새로 사용할 비밀번호를 입력해 주세요.</div><div class="fg"><label class="fl">새 비밀번호</label><input class="inp" type="password" data-k="password" id="r-pw" placeholder="8자 이상 영문·숫자·특수문자"></div><div class="fg"><label class="fl">새 비밀번호 확인</label><input class="inp" type="password" id="r-pw2" placeholder="비밀번호 재입력"></div><div class="err" id="r-msg"></div><div class="actions"><button class="btn primary block" id="r-btn">비밀번호 변경</button></div></div></div></main><div id="oc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/auth.js"></script>
<script>
(function(){
  var pw=document.getElementById('r-pw'), pw2=document.getElementById('r-pw2'), msg=document.getElementById('r-msg'), btn=document.getElementById('r-btn');
  // 재설정 링크로 들어오면 supabase-js가 URL 토큰으로 세션을 복원함
  if(window.ocAuth){
    window.ocAuth.session().then(function(s){
      if(!s){ msg.style.color='#f2777a'; msg.textContent='링크가 만료되었거나 잘못되었습니다. 비밀번호 찾기를 다시 요청해 주세요.'; }
    });
  }
  async function change(){
    msg.style.color=''; msg.textContent='';
    var v=pw.value, v2=pw2.value;
    var okRule=(v.length>=8)&&/[A-Za-z]/.test(v)&&/[0-9]/.test(v)&&/[^A-Za-z0-9]/.test(v);
    if(!okRule){ msg.style.color='#f2777a'; msg.textContent='비밀번호는 8자 이상, 영문·숫자·특수문자를 포함해야 합니다.'; return; }
    if(v!==v2){ msg.style.color='#f2777a'; msg.textContent='비밀번호가 일치하지 않습니다.'; return; }
    if(!window.ocAuth){ msg.textContent='초기화 중입니다.'; return; }
    btn.disabled=true; btn.textContent='변경 중…';
    var r=await window.ocAuth.updatePassword(v);
    btn.disabled=false; btn.textContent='비밀번호 변경';
    if(!r.ok){ msg.style.color='#f2777a'; msg.textContent=r.msg||'변경에 실패했습니다. 링크가 만료되었을 수 있습니다.'; return; }
    msg.style.color='#3a9d63'; msg.textContent='비밀번호가 변경되었습니다. 로그인 페이지로 이동합니다.';
    setTimeout(function(){ location.href='/login.html'; }, 1500);
  }
  btn.addEventListener('click', change);
  pw2.addEventListener('keydown', function(e){ if(e.key==='Enter') change(); });
})();
</script>
</body>
</html>
