<script>
(function(){
  var URL="https://ptdxzxkgddvkusamkiol.supabase.co", KEY="sb_publishable_FDTL3-sQ0c5NVCTA2lif7Q_v6Wee8Wu";
  var sb=window.supabase.createClient(URL,KEY);
  var body=document.getElementById('wd-body');
  function needLogin(){ body.innerHTML='<div class="wd-msg">로그인이 필요합니다.<br><br><a class="btn primary block" href="/login.html">로그인하기</a></div>'; }
  function form(){
    body.innerHTML=''
      +'<div class="wd-notice">회원 탈퇴 시 아래 내용을 확인해 주세요.<br>'
      +'· 탈퇴하면 <b>로그인 및 서비스 이용이 중단</b>됩니다.<br>'
      +'· 회원님이 등록·보강한 데이터는 서비스 운영을 위해 보관될 수 있습니다.<br>'
      +'· 재가입을 원하시면 고객센터(cser@wixon.co.kr)로 문의해 주세요.</div>'
      +'<label class="wd-check"><input type="checkbox" id="wd-agree"><span>위 내용을 확인했으며, 회원 탈퇴에 동의합니다.</span></label>'
      +'<div class="err" id="wd-err"></div>'
      +'<div class="actions"><button class="btn danger block" id="wd-btn" disabled>회원 탈퇴하기</button><a class="btn ghost block" href="/mypage.html">취소하고 돌아가기</a></div>';
    var agree=document.getElementById('wd-agree'), btn=document.getElementById('wd-btn'), err=document.getElementById('wd-err');
    agree.addEventListener('change', function(){ btn.disabled=!agree.checked; });
    btn.addEventListener('click', async function(){
      if(!agree.checked) return;
      if(!confirm('정말 탈퇴하시겠습니까?\n탈퇴 후에는 로그인이 제한됩니다.')) return;
      btn.disabled=true; btn.textContent='처리 중…';
      var r=await window.ocAuth.withdraw();
      if(!r.ok){ err.style.color='#f2777a'; err.textContent=r.msg||'탈퇴 처리에 실패했습니다.'; btn.disabled=false; btn.textContent='회원 탈퇴하기'; return; }
      body.innerHTML='<div class="wd-msg">회원 탈퇴가 완료되었습니다.<br>그동안 이용해 주셔서 감사합니다.<br><br><a class="btn primary block" href="/home.html">홈으로</a></div>';
    });
  }
  sb.auth.getSession().then(function(r){
    var s=r.data&&r.data.session;
    if(!s){ needLogin(); return; }
    form();
  });
})();
</script>
