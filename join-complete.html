<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가입 완료 · OPUSCLAM.COM</title>
<script>(function(){try{if(localStorage.getItem('oc-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="/assets/auth.css">
<style>
  .jc-card{text-align:center;padding:48px 40px}
  .jc-ic{width:66px;height:66px;border-radius:50%;display:inline-grid;place-items:center;margin-bottom:22px}
  .jc-ic.ok{background:rgba(58,157,99,.12);color:#3a9d63}
  .jc-ic.wait{background:rgba(201,154,46,.12);color:#c99a2e}
  .jc-ic svg{width:32px;height:32px}
  .jc-card h2{font-size:22px;font-weight:800;color:var(--tx);margin:0 0 14px;letter-spacing:-.02em}
  .jc-card .jc-desc{font-size:14px;line-height:1.75;color:var(--tx2);margin:0 0 10px}
  .jc-badge{display:inline-block;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;background:var(--tagbg);border:1px solid var(--line2);color:var(--tx);margin-bottom:22px}
  .jc-actions{display:flex;flex-direction:column;gap:10px;margin-top:30px}
  .jc-btn{display:block;width:100%;padding:14px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;text-align:center;cursor:pointer;border:1px solid var(--line2)}
  .jc-btn.primary{background:var(--pri);color:var(--prit);border:none}
  .jc-btn.ghost{background:var(--chip);color:var(--tx2)}
  .jc-loading{padding:30px;text-align:center;color:var(--tx3)}
</style>
</head>
<body>
<div id="oc-net" class="oc-net" aria-hidden="true"></div>
<!-- ===== header (partials/header-auth.html 에서 공통 관리) ===== -->
<div id="oc-header-auth"></div>
<script src="/assets/include.js"></script>
<script src="/assets/app.js"></script><main><div class="wrap narrow" style="margin-top:70px"><div class="authcard jc-card" id="jc-card"><div class="jc-loading">확인 중…</div></div></div></main><div id="oc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/auth.js"></script>
<script>
(function(){
  var card=document.getElementById('jc-card');
  var TYPE={major:'전공자',industry:'음악관계자',org:'단체·기업',school:'음악학교',general:'일반'};
  var CHECK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  var CLOCK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
  function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function renderApproved(name){
    card.innerHTML=''
      +'<div class="jc-ic ok">'+CHECK+'</div>'
      +'<h2>가입이 완료되었습니다</h2>'
      +'<p class="jc-desc">환영합니다'+(name?', <strong>'+esc(name)+'</strong>님':'')+'.<br>지금 바로 오퍼스클램의 서비스를 이용하실 수 있습니다.</p>'
      +'<div class="jc-actions"><a class="jc-btn primary" href="/home.html">홈으로 가기</a><a class="jc-btn ghost" href="/mypage.html">마이페이지</a></div>';
  }
  function renderPending(name, typeLabel){
    card.innerHTML=''
      +'<div class="jc-ic wait">'+CLOCK+'</div>'
      +'<h2>가입 신청이 완료되었습니다</h2>'
      +(typeLabel?'<div class="jc-badge">'+esc(typeLabel)+' 회원 신청</div>':'')
      +'<p class="jc-desc"><strong>'+esc(name||'회원')+'</strong>님, 신청해 주셔서 감사합니다.<br>관리자 승인 후 데이터 등록·보강 기능을 이용하실 수 있습니다.<br>승인 전에도 로그인과 자료 열람은 가능합니다.</p>'
      +'<div class="jc-actions"><a class="jc-btn primary" href="/home.html">홈으로 가기</a><a class="jc-btn ghost" href="/mypage.html">내 신청 상태 보기</a></div>';
  }
  function renderGeneric(){
    card.innerHTML=''
      +'<div class="jc-ic ok">'+CHECK+'</div>'
      +'<h2>가입이 완료되었습니다</h2>'
      +'<p class="jc-desc">오퍼스클램 회원이 되신 것을 환영합니다.<br>로그인 후 서비스를 이용해 주세요.</p>'
      +'<div class="jc-actions"><a class="jc-btn primary" href="/login.html">로그인하기</a><a class="jc-btn ghost" href="/home.html">홈으로 가기</a></div>';
  }

  if(!window.ocAuth){ renderGeneric(); return; }
  window.ocAuth.session().then(function(s){
    if(!s){ renderGeneric(); return; }
    window.ocAuth.myMember().then(function(m){
      if(!m){ renderGeneric(); return; }
      var name=m.name||m.username||'';
      if(m.status==='approved') renderApproved(name);
      else renderPending(name, TYPE[m.member_type]||'');
    }, function(){ renderGeneric(); });
  }, function(){ renderGeneric(); });
})();
</script>
</body>
</html>
