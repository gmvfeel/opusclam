<body>

    <nav class="nav"><a href="/home.html">DATABASE</a><a href="#">OC커뮤니티</a><a href="#">정보SPOT</a><a href="#">레슨 : ON</a><a href="#">리쿠르트</a><a href="#">SHOPPING</a></nav>

      <a class="school" href="#">학교등록</a>

<main><div class="wrap" style="max-width:1140px" id="root">
  <div class="adm-empty">불러오는 중…</div>
</div></main>

<footer><p>ⓒ OPUSCLAM &amp; WIXON ASSOCIATES INC. ALL RIGHTS RESERVED.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/auth.js"></script>
<script>
(function(){
  var TYPE={major:'전공자',industry:'음악관계자',org:'단체·기업',school:'음악학교',general:'일반'};
  var LABEL={pending:'승인 대기',approved:'승인됨',rejected:'반려됨'};
  var root=document.getElementById('root');
  var cur='pending';

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];}); }
  function fmtDate(s){ if(!s) return '-'; try{ var d=new Date(s); return d.getFullYear()+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'+('0'+d.getDate()).slice(-2); }catch(e){ return '-'; } }

  function shell(){
    root.innerHTML =
      '<div class="adm-head"><div class="ptitle" style="margin:0">회원 승인 관리</div><div class="psub" style="margin:0" id="who"></div></div>'+
      '<div class="adm-tabs">'+
        tab('pending','승인 대기')+tab('approved','승인됨')+tab('rejected','반려됨')+tab('','전체')+
      '</div>'+
      '<div class="adm-wrap"><div id="list"><div class="adm-empty">불러오는 중…</div></div></div>';
    document.querySelectorAll('.adm-tab').forEach(function(b){
      b.addEventListener('click',function(){ cur=b.getAttribute('data-s'); setActive(); load(); });
    });
    setActive();
  }
  function tab(s,label){ return '<button type="button" class="adm-tab" data-s="'+s+'">'+label+'<span class="cnt" data-cnt="'+s+'"></span></button>'; }
  function setActive(){ document.querySelectorAll('.adm-tab').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-s')===cur); }); }

  async function load(){
    var box=document.getElementById('list'); box.innerHTML='<div class="adm-empty">불러오는 중…</div>';
    var r=await window.ocAuth.listMembers(cur||null);
    if(!r.ok){ box.innerHTML='<div class="adm-empty">목록을 불러오지 못했습니다. ('+esc(r.msg||'')+')</div>'; return; }
    var rows=r.rows;
    if(!rows.length){ box.innerHTML='<div class="adm-empty">해당하는 회원이 없습니다.</div>'; return; }
    var html='<table class="adm-table"><thead><tr>'+
      '<th>이름</th><th>아이디</th><th>유형</th><th>이메일</th><th>휴대폰</th><th>가입일</th><th>상태</th><th>처리</th></tr></thead><tbody>';
    rows.forEach(function(m){
      var actions='';
      if(m.status!=='approved') actions+='<button class="adm-btn ok" data-act="approve" data-id="'+m.id+'">승인</button>';
      if(m.status!=='rejected') actions+='<button class="adm-btn no" data-act="reject" data-id="'+m.id+'">반려</button>';
      html+='<tr>'+
        '<td class="nm">'+esc(m.name||'-')+'</td>'+
        '<td class="adm-sub">'+esc(m.username||'-')+'</td>'+
        '<td class="adm-type">'+(TYPE[m.member_type]||esc(m.member_type||'-'))+'</td>'+
        '<td class="adm-sub">'+esc(m.email||'-')+'</td>'+
        '<td class="adm-sub">'+esc(m.phone||'-')+'</td>'+
        '<td class="adm-sub">'+fmtDate(m.created_at)+'</td>'+
        '<td><span class="adm-badge '+esc(m.status)+'">'+(LABEL[m.status]||esc(m.status))+'</span></td>'+
        '<td><div class="adm-actions">'+(actions||'-')+'</div></td>'+
      '</tr>';
    });
    html+='</tbody></table>';
    box.innerHTML=html;
    box.querySelectorAll('.adm-btn').forEach(function(b){
      b.addEventListener('click', async function(){
        var id=b.getAttribute('data-id'), act=b.getAttribute('data-act');
        var to=act==='approve'?'approved':'rejected';
        if(!confirm(act==='approve'?'이 회원을 승인하시겠습니까?':'이 회원을 반려하시겠습니까?')) return;
        b.disabled=true; b.textContent='처리 중…';
        var res=await window.ocAuth.setMemberStatus(id, to);
        if(!res.ok){ alert('처리 실패: '+(res.msg||'')); b.disabled=false; return; }
        load(); loadCounts();
      });
    });
  }

  async function loadCounts(){
    var all=await window.ocAuth.listMembers(null); if(!all.ok) return;
    var c={pending:0,approved:0,rejected:0};
    all.rows.forEach(function(m){ if(c[m.status]!=null) c[m.status]++; });
    var set=function(s,n){ var e=document.querySelector('[data-cnt="'+s+'"]'); if(e) e.textContent=n!=null?('('+n+')'):''; };
    set('pending',c.pending); set('approved',c.approved); set('rejected',c.rejected); set('', all.rows.length);
  }

  async function start(){
    if(!window.ocAuth || !window.ocAuth.client()){ root.innerHTML='<div class="adm-deny"><h2>설정 필요</h2><p>Supabase 연결이 필요합니다.</p></div>'; return; }
    var me=await window.ocAuth.myMember();
    if(!me){ location.href='/login.html'; return; }
    if(!me.is_admin){
      root.innerHTML='<div class="adm-deny"><h2>접근 권한이 없습니다</h2><p>이 페이지는 관리자만 이용할 수 있습니다.<br><a href="/home.html" style="text-decoration:underline">메인으로 돌아가기</a></p></div>';
      return;
    }
    shell();
    document.getElementById('who').textContent=(me.name||me.username)+' 관리자님';
    load(); loadCounts();
  }
  start();
})();
</script>
</body>
</html>
