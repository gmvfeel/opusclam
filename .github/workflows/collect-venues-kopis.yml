name: Collect venues KOPIS (weekly)

on:
  schedule:
    - cron: '0 19 * * 2'   # 매주 화요일 04:00 KST
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run KOPIS venue collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          KOPIS_KEY: ${{ secrets.KOPIS_KEY }}
        run: node scripts/collect-venues-kopis.mjs
