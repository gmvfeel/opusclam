<script src="/assets/auth.js"></script>
<script>
(function(){
  
  var idBtn=document.getElementById('chk-id');
  if(idBtn) idBtn.addEventListener('click', async function(){
    var el=document.querySelector('[data-k="username"]'); var msg=document.getElementById('id-msg');
    var u=(el.value||'').trim(); if(!u){msg.textContent='아이디를 입력하세요';msg.style.color='#f2777a';return;}
    if(!window.ocAuth||!window.ocAuth.client()){msg.textContent='(미리보기) Supabase 설정 후 확인됩니다';msg.style.color='#8a94a6';return;}
    var ok=await window.ocAuth.usernameAvailable(u); msg.textContent=ok?'사용 가능한 아이디입니다.':'이미 사용 중인 아이디입니다.'; msg.style.color=ok?'#7bd88f':'#f2777a';
  });
  document.getElementById('submit-btn').addEventListener('click', async function(){
    var err=document.getElementById('form-err'); err.textContent='';
    if(!window.ocAuth){err.textContent='초기화 중입니다. 잠시 후 다시 시도해 주세요.';return;}
    var r=await window.ocAuth.formSignup(document, 'general');
    if(!r||!r.ok){err.textContent=(r&&r.msg)||'가입 처리 중 오류가 발생했습니다.';return;}
    location.href='/join-complete.html';
  });
})();
</script>
